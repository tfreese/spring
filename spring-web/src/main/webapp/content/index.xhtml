<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:f="jakarta.faces.core"
                template="template/layout.xhtml">

    <ui:define name="title">JSF-Demo</ui:define>
    <ui:define name="head"></ui:define>

    <!--Create alias for Controller. -->
    <ui:param name="userController" value="#{indexController}"/>

    <!--    <ui:param name="facesViewId" value="clientsStartPageView"/>-->

    <ui:define name="faces-metadata">
        <f:metadata>
            <f:viewParam name="param1" value="#{indexController.param1}"/>

            <f:viewAction action="#{indexController.initParams}"/>

    </ui:define>

    <ui:define name="css">
        <h:outputStylesheet name="#{uiConfig.getCssPath('demo.css')}"/>

                value="#{text['application.configure']}" rendered="#{indexController.isUserWebAdmin()}">
            <i class="pi pi-cog mr-1"/>
        </h:link>
    </ui:define>

            <p:growl id="messages" showDetail="true" closable="true">

            <div class="start-content-div flex flex-column flex-grow-1 h-full align-items-center">

                <h:outputText class="user flex align-items-center justify-content-center" value="Hello World" title="Hi!"/>

        </div>

        <!-- JSF kann keine Messages bei externen Redirects anzeigen. -->
        <!-- Deshalb der Umweg ueber die URL-Variable und den JavaScript Redirect. -->
        <!-- Sonst wuerden die ELSTAR-Events bei Admins und Client-Start Nachrichten verschluckt werden. -->
        <h:panelGroup id="startAppPanel" style="display: none">
            <h:outputScript>
                function startApp() {
                window.open('#{indexController.redirectAppUrl}', '_blank');
                }
            </h:outputScript>
        </h:panelGroup>

    </ui:define>

    <!-- Dialogs at end of page -->

</ui:composition>
